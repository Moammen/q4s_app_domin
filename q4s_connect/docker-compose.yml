services:
  redis:
    image: redis:7-alpine
    container_name: ets_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  migrations:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ets_migrations
    command: python manage.py migrate --noinput
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DJANGO_SETTINGS_MODULE=q4s_connect.settings
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=mydb
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin123
      - POSTGRES_PORT=5432
    restart: "no"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ets_web
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      migrations:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      - DJANGO_SETTINGS_MODULE=q4s_connect.settings
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=mydb
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin123
      - POSTGRES_PORT=5432
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      # Public monitoring domain (links opened in a browser must resolve)
      # Both point to the public monitoring domain (host.docker.internal:1887 is not
      # reachable from this container; the Cloudflare hairpin works and authenticates).
      - EXTERNAL_SERVER_UI_BASE_URL=https://q4sconnect-sitemonitoring-demo.q4s.app
      - EXTERNAL_SERVER_BACKEND_BASE_URL=https://q4sconnect-sitemonitoring-demo.q4s.app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ets_celery_beat
    command: celery -A q4s_connect.celery_app:app beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    depends_on:
      migrations:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DJANGO_SETTINGS_MODULE=q4s_connect.settings
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=mydb
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin123
      - POSTGRES_PORT=5432
    restart: unless-stopped

  celery-worker-scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ets_celery_worker_scheduler
    command: celery -A q4s_connect.celery_app:app worker -l info -Q opc_scheduler -n scheduler@%%h -c 1
    volumes:
      - .:/app
    depends_on:
      migrations:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DJANGO_SETTINGS_MODULE=q4s_connect.settings
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=mydb
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin123
      - POSTGRES_PORT=5432
    restart: unless-stopped

  celery-worker-polling:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ets_celery_worker_polling
    command: celery -A q4s_connect.celery_app:app worker -l info -Q opc_polling -n polling@%%h -c 8
    volumes:
      - .:/app
    depends_on:
      migrations:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DJANGO_SETTINGS_MODULE=q4s_connect.settings
      - POSTGRES_HOST=postgres        # ← this is the fix
      - POSTGRES_DB=mydb
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin123
      - POSTGRES_PORT=5432
    restart: unless-stopped

  celery-worker-default:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ets_celery_worker_default
    command: celery -A q4s_connect.celery_app:app worker -l info -Q default -n default@%%h -c 2
    volumes:
      - .:/app
    depends_on:
      migrations:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DJANGO_SETTINGS_MODULE=q4s_connect.settings
      - POSTGRES_HOST=postgres        # ← this is the fix
      - POSTGRES_DB=mydb
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin123
      - POSTGRES_PORT=5432
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: ets_postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=mydb
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin123
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d mydb"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data: